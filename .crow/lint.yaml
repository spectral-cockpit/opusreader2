when:
  - event: manual
  # - event: pull_request
  # - event: push
  #   branch: ${CI_REPO_DEFAULT_BRANCH}

steps:
  - name: lint-r
    image: reg.devxy.io/r/r-alpine:4-3.22
    environment:
      FLINT_ERROR_ON_LINT: true
    commands:
      - apk add gcompat
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - source $HOME/.cargo/env
      - R -q -e 'install.packages(c("rlang", "pkgload", "cyclocomp", "flir"), repos = "cran.rpkgs.com/amd64/noble/latest")'
      - R -q -e 'pkgload::load_all(); flir::lint_package(".")'