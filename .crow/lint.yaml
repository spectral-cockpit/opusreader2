when:
  - event: pull_request
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}

steps:
  - name: lint-r
    image: reg.devxy.io/r/r-ubuntu:4.5-noble
    environment:
      FLINT_ERROR_ON_LINT: true
    commands:
      - R -q -e 'install.packages("pak", repos = sprintf("https://r-lib.github.io/p/pak/stable/%s/%s/%s", .Platform$pkgType, R.Version()$os, R.Version()$arch))'
      - R -q -e 'pak::pak()'
      - R -q -e 'pak::pak(c("flir", "cyclocomp", "pkgload"))'
      - R -q -e 'pkgload::load_all(); flir::lint_package(".")'